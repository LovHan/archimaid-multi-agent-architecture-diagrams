name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system graphviz (for pygraphviz)
        run: sudo apt-get update && sudo apt-get install -y graphviz graphviz-dev

      - name: Install Poetry
        run: |
          pipx install poetry
          poetry --version

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock', '**/pyproject.toml') }}

      - name: Install dependencies (all extras + dev)
        run: poetry install --all-extras --with dev --no-interaction

      - name: Lint (ruff check)
        run: poetry run ruff check plot_agent

      - name: Format check (ruff format)
        run: poetry run ruff format --check plot_agent
        continue-on-error: true

      - name: Type check (mypy)
        run: poetry run mypy plot_agent
        continue-on-error: true

      - name: Run offline unit tests
        run: |
          poetry run python -m plot_agent.tests.test_pipeline_offline
          poetry run python -m plot_agent.tests.test_reflection_mock

      - name: Run smoke (no API)
        run: poetry run plot-agent smoke

      - name: Run offline eval (templates only)
        run: poetry run plot-agent-eval --no-llm
